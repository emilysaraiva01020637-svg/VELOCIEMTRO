<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Velocímetro ESP32</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#000,#1b1b1b);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:900px;
    text-align:center;
}

h1{
    font-size:3rem;
    color:#ff0000;
    margin-bottom:20px;
    text-shadow:0 0 20px #ff0000;
}

.info{
    background:#181818;
    padding:20px;
    border-radius:20px;
    margin-bottom:30px;
  
}

.info p{
    margin-top:10px;
    color:#ccc;
    line-height:1.6;
}

.painel{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    background:#111;
    border:2px solid #222;
    border-radius:25px;
    padding:30px;
    width:300px;
    transition:.3s;
}



.titulo{
    font-size:1.3rem;
    color:#aaa;
    margin-bottom:15px;
}

.valor{
    font-size:4rem;
    font-weight:bold;
}

.vel{
    color:#ff0000;
    text-shadow:0 0 15px #ff0000;
}

.rpm{
    color:#ff0000;
    text-shadow:0 0 15px #ff0000;
}

.unidade{
    font-size:1.2rem;
    color:#999;
}

footer{
    margin-top:30px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

    <h1>Velocímetro ESP32</h1>

    <div class="info">
        <h2>ESP32</h2>
        <p>
            Sistema de monitoramento em tempo real utilizando ESP32 de velocidade e RPM.
        </p>
    </div>

    <div class="painel">

        <div class="card">
            <div class="titulo">Velocidade</div>
            <div class="valor vel">
                <span id="velocidade">0</span>
            </div>
            <div class="unidade">km/h</div>
        </div>

        <div class="card">
            <div class="titulo">RPM</div>
            <div class="valor rpm">
                <span id="rpm">0</span>
            </div>
            <div class="unidade">rotações/min</div>
        </div>

    </div>

    <footer>
        Monitoramento da ESP32
    </footer>

</div>

<script>

function atualizarDados() {
    fetch('buscar_ultimo.php')
    .then(response => response.json())
    .then(data => {
        document.getElementById('velocidade').innerText = data.velocidade;
        document.getElementById('rpm').innerText = data.rpm;
    })
    .catch(error => console.log(error));
}

atualizarDados();
setInterval(atualizarDados, 500);

</script>

</body>
</html>
