<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Monitor ESP32</title>
<style>
body{ background: #111; color: #ff1100; font-family: Arial; text-align: center; margin-top: 100px; }
.valor{ font-size: 50px; margin: 20px; }
</style>
</head>
<body>
<h1>Dados da ESP32</h1>
<div class="valor">Velocidade: <span id="velocidade">0</span></div>
<div class="valor">RPM: <span id="rpm">0</span></div>
Scrip que cata do buscar_ultimo.php e atualiza os dados sem recarregar a página
<script>
function atualizarDados() {
fetch('dados.php')
.then(response => response.json())
.then(data => {
document.getElementById('velocidade').innerText = data.velocidade;
document.getElementById('rpm').innerText = data.rpm;
})
.catch(error => console.log(error));
}
atualizarDados();
setInterval(atualizarDados, 1000);
</script>
</body>
</html>
